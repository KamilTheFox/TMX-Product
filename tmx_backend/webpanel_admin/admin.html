<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMX · Панель администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --tmx-blue:#004898;
            --tmx-blue-700:#003a7c;
            --tmx-blue-900:#002a57;
            --tmx-sky:#58c0f0;
            --tmx-sky-600:#2ba6e0;
            --tmx-sky-050:#eef7fd;
            --tmx-blue-050:#eaf1f8;
            --ink:#1b2533;
            --muted:#5d6b80;
            --line:#d7e1ed;
            --bg:#eef2f7;
            --surface:#ffffff;
            --danger:#cf4040;
            --danger-700:#b23636;
            --danger-050:#fcebea;
            --warn:#d97706;
            --warn-050:#fef3c7;
            --radius:14px;
            --shadow:0 1px 2px rgba(16,42,80,.06), 0 10px 30px rgba(16,42,80,.07);
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:'IBM Plex Sans', system-ui, sans-serif;
            color:var(--ink);
            background:
                radial-gradient(1100px 480px at 100% -8%, var(--tmx-sky-050), transparent 60%),
                radial-gradient(900px 420px at -10% 0%, #e7eef7, transparent 55%),
                var(--bg);
            min-height:100vh;
        }
        .display{font-family:'Saira', sans-serif;letter-spacing:.2px}

        /* ---------- Шапка ---------- */
        .topbar{
            background:linear-gradient(120deg, var(--tmx-blue-900), var(--tmx-blue) 55%, var(--tmx-sky-600));
            color:#fff;
            box-shadow:0 8px 30px rgba(0,42,87,.25);
        }
        .logo-chip{
            background:#fff;border-radius:12px;padding:8px 10px;display:flex;align-items:center;
            box-shadow:0 6px 16px rgba(0,42,87,.18);
        }
        .logo-chip img{height:34px;width:auto;display:block}

        /* ---------- Контейнеры ---------- */
        .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
        .soft{background:var(--tmx-blue-050);border:1px solid var(--line);border-radius:12px}

        /* ---------- Кнопки ---------- */
        .btn{
            display:inline-flex;align-items:center;justify-content:center;gap:.45rem;
            font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:.9rem;line-height:1;
            padding:.6rem .95rem;border-radius:10px;border:1px solid transparent;cursor:pointer;
            transition:transform .04s ease, background .15s ease, box-shadow .15s ease, color .15s ease;
            white-space:nowrap;
        }
        .btn:active{transform:translateY(1px)}
        .btn-primary{background:var(--tmx-blue);color:#fff}
        .btn-primary:hover{background:var(--tmx-blue-700)}
        .btn-sky{background:var(--tmx-sky);color:#06314f}
        .btn-sky:hover{background:var(--tmx-sky-600);color:#fff}
        .btn-ghost{background:#fff;border-color:var(--line);color:var(--tmx-blue)}
        .btn-ghost:hover{background:var(--tmx-blue-050)}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-danger:hover{background:var(--danger-700)}
        .btn-warn{background:var(--warn-050);color:var(--warn);border:1px solid #fcd34d}
        .btn-warn:hover{background:#fde68a}
        .btn-sm{padding:.4rem .6rem;font-size:.8rem;border-radius:8px}
        .icon-btn{
            display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
            border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--tmx-blue);cursor:pointer;
            transition:background .15s ease,color .15s ease;
        }
        .icon-btn:hover{background:var(--tmx-blue-050)}
        .icon-btn.danger{color:var(--danger)}
        .icon-btn.danger:hover{background:var(--danger-050)}

        /* ---------- Поля ввода ---------- */
        .input{
            width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;
            padding:.58rem .7rem;color:var(--ink);font-size:.92rem;font-family:inherit;
            transition:border-color .15s ease, box-shadow .15s ease;
        }
        .input::placeholder{color:#9aa7ba}
        .input:focus{outline:none;border-color:var(--tmx-sky-600);box-shadow:0 0 0 3px rgba(43,166,224,.18)}
        label.lbl{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.3rem}

        /* ---------- Бейджи ---------- */
        .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .55rem;border-radius:999px;font-size:.72rem;font-weight:700;letter-spacing:.2px}
        .badge-blue{background:var(--tmx-blue-050);color:var(--tmx-blue)}
        .badge-sky{background:var(--tmx-sky-050);color:var(--tmx-sky-600)}
        .badge-danger{background:var(--danger-050);color:var(--danger)}
        .badge-warn{background:var(--warn-050);color:var(--warn)}
        .badge-muted{background:#eef1f5;color:var(--muted)}

        /* ---------- Вкладки ---------- */
        .tab{
            display:inline-flex;align-items:center;gap:.45rem;padding:.55rem .85rem;border-radius:10px;
            font-weight:600;font-size:.88rem;color:var(--muted);background:transparent;border:1px solid transparent;
            cursor:pointer;transition:background .15s ease,color .15s ease;
        }
        .tab i{font-size:.85rem}
        .tab:hover{background:var(--tmx-blue-050);color:var(--tmx-blue)}
        .tab.active{background:var(--tmx-blue);color:#fff;box-shadow:0 6px 16px rgba(0,72,152,.25)}

        /* ---------- Статистика ---------- */
        .stat{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow)}
        .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(var(--tmx-sky),var(--tmx-blue))}
        .stat .num{font-family:'Saira',sans-serif;font-weight:800;font-size:2rem;line-height:1;color:var(--tmx-blue)}
        .stat .cap{margin-top:.35rem;color:var(--muted);font-size:.85rem;font-weight:600}

        /* ---------- Таблица ---------- */
        .tbl{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:12px}
        .tbl th{background:var(--tmx-blue-050);color:var(--tmx-blue);text-align:left;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:.65rem .8rem;border-bottom:1px solid var(--line)}
        .tbl td{padding:.6rem .8rem;border-bottom:1px solid var(--line);font-size:.9rem}
        .tbl tr:last-child td{border-bottom:none}
        .tbl tbody tr:hover td{background:#f6fafd}
        .tbl tr.row-banned td{background:var(--danger-050)}

        /* ---------- Сообщения ---------- */
        .alert{padding:.7rem .9rem;border-radius:10px;font-weight:500;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
        .alert-ok{background:var(--tmx-sky-050);color:#0a4f7a;border:1px solid #bfe6fb}
        .alert-err{background:var(--danger-050);color:var(--danger);border:1px solid #f3c4c1}

        .chip{display:inline-flex;align-items:center;gap:.4rem;background:#eef1f5;color:var(--ink);padding:.28rem .6rem;border-radius:8px;font-size:.82rem;font-weight:600}
        .muted{color:var(--muted)}
        .loading{display:flex;flex-direction:column;align-items:center;gap:.6rem;padding:3rem 0;color:var(--tmx-blue)}
        .spin{width:34px;height:34px;border:3px solid var(--tmx-blue-050);border-top-color:var(--tmx-blue);border-radius:50%;animation:sp .8s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        .fade-in{animation:fi .28s ease both}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

        .photo-card img{transition:transform .25s ease}
        .photo-card:hover img{transform:scale(1.04)}

        /* Плашка «забанен» поверх фото */
        .banned-overlay{
            position:absolute;top:8px;right:8px;
            background:var(--danger);color:#fff;
            font-size:.68rem;font-weight:700;letter-spacing:.3px;
            padding:.2rem .5rem;border-radius:6px;
            pointer-events:none;
        }
    </style>
</head>

                        <input type="email" id="email" placeholder="name@mail.ru" class="input">
                    </div>
                    <div>
                        <label class="lbl">Код из письма</label>
                        <input type="text" id="code" placeholder="Введите код" class="input">
                    </div>
                    <div class="flex gap-3 pt-1">
                        <button onclick="sendCode()" class="btn btn-ghost flex-1">
                            <i class="fas fa-paper-plane"></i> Отправить код
                        </button>
                        <button onclick="login()" class="btn btn-primary flex-1">
                            <i class="fas fa-arrow-right-to-bracket"></i> Войти
                        </button>
                    </div>
                </div>
                <div id="message" class="mt-4"></div>
            </div>
        </section>

        <!-- ПАНЕЛЬ -->
        <section id="adminPanel" style="display:none;">
            <nav class="card p-2 mb-5 flex flex-wrap gap-1">
                <button data-tab="dashboard" onclick="showDashboard()" class="tab"><i class="fas fa-gauge-high"></i> Дашборд</button>
                <button data-tab="users"     onclick="showUsers()"     class="tab"><i class="fas fa-users"></i> Пользователи</button>
                <button data-tab="photos"    onclick="showPhotos()"    class="tab"><i class="fas fa-images"></i> Фото</button>
            </nav>
            <div id="content" class="fade-in"></div>
        </section>
    </main>

    <script>
        let token = localStorage.getItem('token');
        const API = window.location.origin;

        /* ---------------- Утилиты ---------------- */
        function escapeHtml(value){
            return String(value ?? '-')
                .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
                .replaceAll('"','&quot;').replaceAll("'","&#039;");
        }

        function showMessage(msg, type){
            const div = document.getElementById('message');
            if(!div){ alert(msg); return; }
            const cls = type === 'ok' ? 'alert-ok' : 'alert-err';
            const icon = type === 'ok' ? 'fa-circle-check' : 'fa-circle-exclamation';
            div.innerHTML = `<div class="alert ${cls}"><i class="fas ${icon}"></i><span>${escapeHtml(msg)}</span></div>`;
            setTimeout(() => { div.innerHTML = ''; }, 5000);
        }

        function loader(){
            return `<div class="loading"><div class="spin"></div><div>Загрузка…</div></div>`;
        }

        function setActiveTab(name){
            document.querySelectorAll('.tab').forEach(t =>
                t.classList.toggle('active', t.dataset.tab === name));
        }

        async function apiCall(url, options = {}){
            const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
            if(!(options.body instanceof FormData)){
                headers['Content-Type'] = 'application/json';
            }
            const resp = await fetch(API + url, { ...options, headers });
            const raw = await resp.text();
            let data;
            try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
            if(!resp.ok) throw new Error(data.detail || data.message || `HTTP ${resp.status}`);
            return data;
        }

        /* ---------------- Авторизация ---------------- */
        async function sendCode(){
            const email = (document.getElementById('email').value || '').trim();
            if(!email){ showMessage('Введите email', 'err'); return; }
            try{
                const resp = await fetch(API + '/api/auth/send-code', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ email })
                });
                const raw = await resp.text();
                let data; try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
                if(resp.ok && data.ok){
                    showMessage('Код отправлен. Проверьте почту и папку «Спам».', 'ok');
                }else{
                    showMessage('Ошибка отправки кода: ' + (data.detail || data.message || JSON.stringify(data)), 'err');
                }
            }catch(e){ showMessage('Ошибка сети: ' + e.message, 'err'); }
        }

        async function login(){
            const email = (document.getElementById('email').value || '').trim();
            const code  = (document.getElementById('code').value || '').trim();
            if(!email || !code){ showMessage('Введите email и код', 'err'); return; }
            try{
                const resp = await fetch(API + '/api/auth/verify', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ email, code })
                });
                const raw = await resp.text();
                let data; try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
                if(resp.ok && data.access_token){
                    localStorage.setItem('token', data.access_token);
                    token = data.access_token;
                    enterPanel();
                }else{
                    showMessage(data.detail || data.message || 'Неверный код', 'err');
                }
            }catch(e){ showMessage('Ошибка сети: ' + e.message, 'err'); }
        }

        function logout(){
            localStorage.removeItem('token');
            location.reload();
        }

        function enterPanel(){
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('signOut').style.display = 'inline-flex';
            showDashboard();
        }

        /* ---------------- Дашборд ---------------- */
        async function showDashboard(){
            setActiveTab('dashboard');
            const content = document.getElementById('content');
            content.innerHTML = loader();
            try{
                const [user, defectsResp, usersResp] = await Promise.all([
                    apiCall('/api/auth/me'),
                    fetch(API + '/admin-api/photos'),
                    apiCall('/api/admin/users'),
                ]);
                const defectsData = await defectsResp.json();
                const photos = defectsData.photos || [];

                content.innerHTML = `
                    <div class="card p-4 mb-5 flex items-center gap-3">
                        <span class="icon-btn" style="cursor:default"><i class="fas fa-user-shield"></i></span>
                        <div>
                            <div class="muted text-xs">Вы вошли как</div>
                            <div class="font-semibold">${escapeHtml(user.email)}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div class="stat"><div class="num">${photos.length}</div><div class="cap">Фотографий дефектов</div></div>
                        <div class="stat"><div class="num">${usersResp.length}</div><div class="cap">Пользователей</div></div>
                        <div class="stat"><div class="num">${usersResp.filter(u => u.ban).length}</div><div class="cap">Заблокировано</div></div>
                    </div>
                `;
            }catch(e){
                content.innerHTML = `<div class="alert alert-err"><i class="fas fa-circle-exclamation"></i>Ошибка загрузки: ${escapeHtml(e.message)}</div>`;
            }
        }

        /* ---------------- Пользователи ---------------- */
        async function showUsers(){
            setActiveTab('users');
            const content = document.getElementById('content');
            content.innerHTML = loader();
            try{
                const users = await apiCall('/api/admin/users');
                content.innerHTML = `
                    <h2 class="display text-lg font-bold mb-4" style="color:var(--tmx-blue)">Пользователи (${users.length})</h2>
                    <div class="card overflow-x-auto">
                        <table class="tbl">
                            <thead>
                                <tr>
                                    <th>ID</th><th>Email</th><th>Монеты</th><th>Регистрация</th>
                                    <th class="text-center">Админ</th><th class="text-center">Бан</th><th class="text-center">Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${users.map(u => `
                                    <tr class="${u.ban ? 'row-banned' : ''}">
                                        <td class="muted">${u.id_user}</td>
                                        <td class="font-medium">${escapeHtml(u.email)}</td>
                                        <td class="text-center">${u.coin ?? 0}</td>
                                        <td class="muted text-xs">${u.created_at ? u.created_at.slice(0,10) : '-'}</td>
                                        <td class="text-center">${u.admin ? '<span class="badge badge-blue">Админ</span>' : '<span class="muted">—</span>'}</td>
                                        <td class="text-center">${u.ban ? '<span class="badge badge-danger">Заблокирован</span>' : '<span class="muted">—</span>'}</td>
                                        <td>
                                            <div class="flex gap-2 justify-center flex-wrap">
                                                <button onclick="toggleUserAdmin(${u.id_user}, ${u.admin})"
                                                        class="btn btn-sm ${u.admin ? 'btn-ghost' : 'btn-primary'}">
                                                    ${u.admin ? 'Снять права' : 'Сделать админом'}
                                                </button>
                                                <button onclick="toggleUserBan(${u.id_user}, ${u.ban})"
                                                        class="btn btn-sm ${u.ban ? 'btn-sky' : 'btn-danger'}">
                                                    <i class="fas fa-${u.ban ? 'lock-open' : 'ban'}"></i>
                                                    ${u.ban ? 'Разблокировать' : 'Заблокировать'}
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${users.length === 0 ? '<div class="muted text-center py-6">Пользователей нет</div>' : ''}
                `;
            }catch(e){
                content.innerHTML = `<div class="alert alert-err"><i class="fas fa-circle-exclamation"></i>Ошибка загрузки пользователей: ${escapeHtml(e.message)}</div>`;
            }
        }

        async function toggleUserAdmin(userId, currentAdmin){
            const newAdmin = !currentAdmin;
            if(!confirm(newAdmin ? 'Назначить администратором?' : 'Снять права администратора?')) return;
            try{
                await apiCall(`/api/admin/users/${userId}`, { method:'PATCH', body: JSON.stringify({ admin: newAdmin }) });
                showUsers();
            }catch(e){ alert('Ошибка: ' + e.message); }
        }

        async function toggleUserBan(userId, currentBanned){
            const newBanned = !currentBanned;
            if(!confirm(newBanned ? 'Заблокировать пользователя?' : 'Разблокировать пользователя?')) return;
            try{
                await apiCall(`/api/admin/users/${userId}`, { method:'PATCH', body: JSON.stringify({ ban: newBanned }) });
                showUsers();
            }catch(e){ alert('Ошибка: ' + e.message); }
        }

        /* ---------------- Фотографии ---------------- */

        // Кэш статусов забаненных пользователей, чтобы не перезагружать список
        let bannedUsersCache = new Set();

        async function loadBannedUsers(){
            try{
                const users = await apiCall('/api/admin/users');
                bannedUsersCache = new Set(users.filter(u => u.ban).map(u => u.id_user));
            }catch{ bannedUsersCache = new Set(); }
        }

        async function showPhotos(){
            setActiveTab('photos');
            const content = document.getElementById('content');
            content.innerHTML = loader();

            try{
                const [photosResp] = await Promise.all([
                    fetch(API + '/admin-api/photos'),
                    loadBannedUsers(),
                ]);
                const raw = await photosResp.text();
                let data; try { data = JSON.parse(raw); } catch { throw new Error(raw); }
                if(!photosResp.ok) throw new Error(data.detail || data.message || `HTTP ${photosResp.status}`);
                const photos = data.photos || [];

                if(photos.length === 0){
                    content.innerHTML = `
                        <div class="card p-10 text-center muted">
                            <i class="fas fa-image text-3xl mb-2" style="color:var(--tmx-sky)"></i>
                            <p>Нет фотографий</p>
                        </div>`;
                    return;
                }

                content.innerHTML = `
                    <h2 class="display text-lg font-bold mb-4" style="color:var(--tmx-blue)">Все фотографии (${photos.length})</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        ${photos.map(p => renderPhotoCard(p)).join('')}
                    </div>
                `;
            }catch(e){
                content.innerHTML = `<div class="alert alert-err"><i class="fas fa-circle-exclamation"></i>Ошибка загрузки фотографий: ${escapeHtml(e.message)}</div>`;
            }
        }

        function renderPhotoCard(p){
            const userBanned = p.id_user && bannedUsersCache.has(p.id_user);
            const banBtnLabel = userBanned ? 'Разблокировать' : 'Заблокировать';
            const banBtnClass = userBanned ? 'btn-sky' : 'btn-warn';
            const banBtnIcon = userBanned ? 'fa-lock-open' : 'fa-ban';

            const userBtnHtml = p.id_user
                ? `<button onclick="banUserFromPhoto(${p.id_user}, ${userBanned})"
                           class="btn btn-sm ${banBtnClass} w-full mt-1"
                           id="banBtn_${p.id_user}_${escapeHtml(p.rel_path).replaceAll('/','_')}">
                       <i class="fas ${banBtnIcon}"></i> ${banBtnLabel}
                   </button>`
                : `<button class="btn btn-sm btn-ghost w-full mt-1" disabled style="opacity:.4;cursor:default">
                       <i class="fas fa-user-slash"></i> Нет пользователя
                   </button>`;

            return `
                <div class="card photo-card overflow-hidden" id="photoCard_${escapeHtml(p.name)}">
                    <div class="overflow-hidden relative" style="height:11rem">
                        <img src="${p.path}" class="w-full h-44 object-cover cursor-pointer"
                             alt="${escapeHtml(p.name)}" onclick="window.open('${p.path}','_blank')">
                        ${userBanned ? '<span class="banned-overlay"><i class="fas fa-ban"></i> Забанен</span>' : ''}
                    </div>
                    <div class="p-3">
                        <p class="text-xs font-bold truncate" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</p>
                        <div class="text-xs muted mt-2 space-y-1">
                            <p><b style="color:var(--ink)">Линия:</b> ${escapeHtml(p.line_label || '-')}</p>
                            <p><b style="color:var(--ink)">Поезд:</b> ${escapeHtml(p.train || '-')}</p>
                            <p><b style="color:var(--ink)">Вагон:</b> ${escapeHtml(p.wagon || '-')}</p>
                            <p><b style="color:var(--ink)">Дата:</b> ${escapeHtml(p.uploaded_at || '-')}</p>
                            ${p.category  ? `<p><b style="color:var(--ink)">Тип дефекта:</b> ${escapeHtml(p.category)}</p>` : ''}
                            ${p.text_prob ? `<p><b style="color:var(--ink)">Описание:</b> ${escapeHtml(p.text_prob)}</p>` : ''}
                            ${p.id_user   ? `<p class="muted">Пользователь ID: ${p.id_user}</p>` : ''}
                        </div>
                        <p class="text-xs muted mt-2">${(p.size / 1024).toFixed(1)} KB</p>
                        <button onclick="deletePhoto('${p.rel_path}')" class="btn btn-danger btn-sm w-full mt-2">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                        ${userBtnHtml}
                    </div>
                </div>
            `;
        }

        async function banUserFromPhoto(userId, currentBanned){
            const newBanned = !currentBanned;
            const action = newBanned ? 'Заблокировать пользователя?' : 'Разблокировать пользователя?';
            if(!confirm(action)) return;
            try{
                await apiCall(`/api/admin/users/${userId}`, {
                    method:'PATCH', body: JSON.stringify({ ban: newBanned })
                });
                // Обновляем кэш и перерисовываем фото
                if(newBanned) bannedUsersCache.add(userId);
                else bannedUsersCache.delete(userId);
                showPhotos();
            }catch(e){ alert('Ошибка: ' + e.message); }
        }

        async function deletePhoto(relPath){
            if(!confirm('Удалить фото и связанную запись о дефекте?')) return;
            const safePath = relPath.split('/').map(encodeURIComponent).join('/');
            try{
                const resp = await fetch(API + '/admin-api/photos/' + safePath, { method:'DELETE' });
                const data = await resp.json().catch(() => ({}));
                if(!resp.ok || data.ok === false){
                    alert(data.detail || data.message || 'Не удалось удалить');
                }
            }catch(e){
                alert('Ошибка удаления: ' + e.message);
            }
            showPhotos();
        }

        /* ---------------- Старт ---------------- */
        if(token) enterPanel();
    </script>
</body>
</html>
